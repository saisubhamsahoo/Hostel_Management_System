<div class="auth-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card auth-card">
          <div class="card-body text-center">
            <h2 class="mb-4">Email Verification</h2>

            <div *ngIf="loading">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <p class="mt-3">Verifying your email...</p>
            </div>

            <div *ngIf="!loading && success" class="alert alert-success">
              {{ message }}
              <p class="mt-2">Redirecting to login...</p>
            </div>

            <div *ngIf="!loading && !success" class="alert alert-danger">
              {{ message }}
            </div>

            <div class="mt-3">
              <a routerLink="/login" class="btn btn-primary">Go to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
